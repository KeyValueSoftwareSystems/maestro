# Harvest a finished run into memory: distill lessons (a skill's judgement) then consolidate
# (the engine's deterministic reduce step — NOT a skill, so swapping the retrospect skill
# cannot change how corroboration/promotion works).
# Standalone off-cycle harvest: /maestro <slug> workflows/retrospect.yaml
# Also reused as the harvest half of workflows/archive.yaml.
version: 1
name: retrospect
description: Distill a finished run into staged lessons, then consolidate the memory store.
inputs:
  slug: {type: string, required: true, description: the finished feature to harvest}
  feature: {type: string, default: "${inputs.slug}"}
defaults:
  model: haiku
  agent: analyst
start: retrospect
nodes:
  - id: retrospect
    type: agent
    label: Distill lessons
    instruction: |
      Harvest the finished run for feature "${inputs.slug}". Read its ledger
      .maestro/runs/${inputs.slug}/state.yaml (gate decisions + their feedback/guidance text;
      per-step visits/attempts/status showing loops and retries) and the run's review/QA
      artifacts under .maestro/runs/${inputs.slug}/. Then do BOTH:
      1. Add to / refresh the living docs — technical, functional AND architectural — for the
         domains this feature touched. CREATE docs/technical/<domain>.md and
         docs/functional/<domain>.md for any NEW domain the feature introduced, else update
         the existing ones. Update docs/architecture.md whenever a service, component,
         connection or data flow was added or changed — add the new node(s)/edge(s) to the
         Mermaid diagram(s) and the matching "How services connect" entry. Create missing
         files; edit existing ones in place (never duplicate); skip only a surface the feature
         genuinely did not affect.
      2. Write a STRUCTURED lessons drop to .maestro/memory/incoming/${inputs.slug}.json as
         JSON: {"slug": "${inputs.slug}", "lessons": [{"domain": "<role>",
         "key": "<stable-kebab-key>", "text": "<one actionable sentence>"}, ...]}. Draw the
         lessons from TWO sources: (a) the changes the USER requested — every revise/review
         request and gate feedback/guidance, PLUS the out-of-band instructions in the
         ledger's `notes`, i.e. where the run had to be corrected to meet the requirement
         (read .maestro/runs/${inputs.slug}/requirement/ to frame the gap); and
         (b) the ISSUES faced while running — failed/retried steps, loops that hit their cap,
         contract/QA/build breakages. Phrase each as forward-looking guidance so the next run
         gets it right first time. Choose each `key` so another run seeing the same pattern
         picks the SAME key (that is how the engine corroborates). Do NOT set authoritative.
         Do NOT write knowledge/ or candidates/ — the engine renders those.
    skill: retrospect
    inputs: {slug: "${inputs.slug}"}
    outputs: [incoming_path, lessons_count, summary]
    artifact: ".maestro/memory/incoming/${inputs.slug}.json"
    next: consolidate

  - id: consolidate
    type: script
    label: Consolidate memory (engine)
    # Deterministic reduce step: fold incoming/* into candidates/, count DISTINCT runs,
    # promote past the threshold (config memory.promote_threshold, else 3) into knowledge/,
    # prune/cap, rewrite index.md, clear incoming. Owned by the engine, not a skill.
    run: [python3, .maestro/engine/mem_consolidate.py, ".maestro/memory"]
    next: end
