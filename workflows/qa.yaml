# QA phase: author + run the automated functional/E2E suite from the test-case catalog,
# with a bounded fix cycle and a human escalation gate.
version: 1
name: qa
description: Automate and run the functional test suite; fix loop on failures.
inputs:
  slug: {type: string, required: true}
  feature: {type: string, default: "${inputs.slug}"}
defaults:
  model: haiku
  agent: qa
  max_visits: 10
start: qa_run
nodes:
  - id: qa_run
    type: agent
    label: Author & run E2E suite
    instruction: |
      Automate the functional test-case catalog at .maestro/runs/${inputs.slug}/test-cases.md
      into an executable E2E suite (use the project's existing E2E framework, else
      Playwright; critical journeys first) and RUN it. Write the run report. Report
      results honestly — failures route into the fix loop, they are not yours to hide.
    skill: qa-automation
    inputs: {slug: "${inputs.slug}", feature: "${inputs.feature}"}
    outputs: [passed, failed_count, summary]
    artifact: ".maestro/runs/${inputs.slug}/qa/report.md"
    max_visits: 5
    on_exhausted: qa_gate
    routes:
      - {when: "${steps.qa_run.outputs.passed} == true", to: end}
      - {to: qa_fix}

  - id: qa_fix
    type: agent
    label: Fix failures
    instruction: |
      One fix attempt: diagnose the failures in .maestro/runs/${inputs.slug}/qa/report.md and
      apply the smallest safe fix (product bug or genuine test bug — never weaken or
      delete a legitimate failing assertion). Re-run the failing specs before returning.
      Do NOT loop — the workflow re-invokes you if needed.
    skill: fix-loop
    agent: implementer
    inputs: {slug: "${inputs.slug}", report: ".maestro/runs/${inputs.slug}/qa/report.md"}
    outputs: [fix_summary, checks_passed]
    max_visits: 3
    on_exhausted: qa_gate
    next: qa_run

  - id: qa_gate
    type: gate
    label: QA escalation
    prompt: |
      QA is still failing after the automated fix rounds.
      Last run: ${steps.qa_run.outputs.summary}
      Report: .maestro/runs/${inputs.slug}/qa/report.md
    options:
      - {id: retry, label: One more fix round (with your guidance), to: qa_fix, input: guidance}
      - {id: accept, label: Accept with known failures, to: end}
      - {id: abandon, label: Abort, to: abort}

outputs:
  qa_summary: "${steps.qa_run.outputs.summary}"
  qa_report: ".maestro/runs/${inputs.slug}/qa/report.md"
