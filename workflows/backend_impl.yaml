# =============================================================================
# KeyValue AI-SDLC  ::  backend_impl.yaml (standalone sub-workflow) — BACKEND
# =============================================================================
# Runnable directly:
#   conductor run backend_impl.yaml --input feature="..." \
#     --input feature_slug="saved-search" --input contract_summary="GET /searches ..."
# Composed by main.yaml (via dispatch.yaml) per affected stack. Also `/backend-impl`.
#
# Flow (matches the guide: task split -> execute -> tests -> verify -> reviewer):
#   tasks (load-or-author tasks.json) -> implement (for_each over independent slices,
#   parallel) -> merge_slices -> tests -> verify -> review
#     -> unit+integration -> contract verification   (deterministic gates)
#       -> backend review (/backend-review)          ==> reviews/summary.md
# A failed check routes to the `fix` step (/fix), which fixes + re-verifies in one
# turn (bound of 3 lives INSIDE the skill; the graph stays acyclic). When `fix` is
# exhausted OR the review is blocking, we DON'T just fail — we escalate to a human:
#   (fix unresolved | reviewers blocking) -> impl_analyze -> impl_human_gate
#     -> "retry" (+ human feedback) -> fix   (resumes from the CURRENT branch/changes)
#     -> "give up"                   -> give_up (terminate, hand to a human)
# The retry loops back into `fix` carrying the human's feedback — it builds on the
# existing branch, never re-implements from scratch. Behavior lives in the skills.
# =============================================================================

workflow:
  name: sdlc-backend-impl
  description: Backend — task split, implement, test, verify, backend review.
  entry_point: tasks

  instructions:
    - >-
      Each step invokes an installed skill by name; the skill owns its own behavior.
      Write each artifact to the path the skill resolves from skills.config.yaml
      `artifacts:` before returning.

  runtime:
    provider: claude-agent-sdk
    default_model: claude-haiku-4-5   # backstop for any agent without an explicit model:

  limits:
    max_iterations: 44             # headroom for the analyze -> human-gate -> fix retry cycle
    timeout_seconds: 3000

  input:
    feature:
      type: string
      required: true
    feature_slug:
      type: string
      required: true
    contract_summary:
      type: string
      required: true
      description: The cross-repo contract the backend OWNS (implements exactly).
    contract_path:
      type: string
      required: false
      default: ""
    lld_path:
      type: string
      required: false
      default: ""
    model:
      type: object
      required: false
      default: {}
      description: >
        Per-agent model overrides, keyed by agent name. Any agent not listed
        falls back to claude-haiku-4-5.

# ----------------------------------------------------------------------------
# Fan-out: one isolated build per INDEPENDENT slice, concurrently. Each slice's
# tasks are dependency-ordered inside the item (the skill runs them in order);
# groups are mutually independent (disjoint writes — validated), so parallel is safe.
# ----------------------------------------------------------------------------
# NOTE: this for_each uses a prompt-only inline agent (unlike main.yaml's type:workflow shape).
# Provisional pending Conductor validation — if the runtime rejects it, wrap the slice/scenario
# build in a one-step sub-workflow (the prompt is unchanged).
for_each:
  - name: implement
    type: for_each
    description: Build independent task slices in parallel (each slice = ordered tasks).
    source: tasks.output.slices
    as: slice
    key_by: slice.group_id
    max_concurrent: 3
    failure_mode: all_or_nothing
    agent:
      name: build_slice
      model: "{{ workflow.input.model.build_slice if workflow.input.model.build_slice is defined else 'claude-haiku-4-5' }}"
      max_agent_iterations: 100
      prompt: |
        Run the **/backend-impl** skill in SLICE mode — implement ONLY this slice. Inputs:
        - feature:          {{ workflow.input.feature }}
        - feature_slug:     {{ workflow.input.feature_slug }}
        - group_id:         {{ slice.group_id }}
        - tasks_path:       {{ tasks.output.tasks_path }}
        - branch:           feature/{{ workflow.input.feature_slug }}-backend-{{ slice.group_id }}
        - contract_summary (backend OWNS this — implement it exactly): {{ workflow.input.contract_summary }}
        Batch-load the context manifest in one call; run the slice's tasks in dependency order,
        test-first, in an isolated git worktree on the branch above. Return: worktree, tasks_done.
      output:
        worktree: { type: string }
        tasks_done: { type: array }
    routes:
      - to: merge_slices

agents:
  # ---- 0. TASK DAG (load design-phase tasks.json, else author via /backend-tasks) ----
  - name: tasks
    description: Load-or-author the task DAG (tasks.json) and return the fan-out slices.
    model: "{{ workflow.input.model.tasks if workflow.input.model.tasks is defined else 'claude-haiku-4-5' }}"
    prompt: |
      Ensure `.maestro/{{ workflow.input.feature_slug }}/backend/tasks.json` exists and is valid:
      - If present (authored by /backend-design in the design phase), validate it:
        `python3 workflows/validate_tasks.py .maestro/{{ workflow.input.feature_slug }}/backend/tasks.json`
      - If absent, run the **/backend-tasks** skill to author it (JSON, schema-valid), then validate.
      Inputs:
      - feature:          {{ workflow.input.feature }}
      - feature_slug:     {{ workflow.input.feature_slug }}
      - contract_summary: {{ workflow.input.contract_summary }}
      {% if workflow.input.lld_path %}- lld_path: {{ workflow.input.lld_path }}{% endif %}
      Return: tasks_path, slices (the `slices` array from tasks.json), risky.
    output:
      tasks_path: { type: string }
      slices: { type: array }
      risky: { type: boolean }
    routes:
      - to: implement

  # ---- 1b. MERGE SLICES (conflict-free by the disjoint-writes invariant) ---
  - name: merge_slices
    type: script
    description: Merge each slice's worktree branch onto the stack branch, then run tests once.
    command: bash
    args:
      - "-c"
      - |
        set -uo pipefail
        base="feature/{{ workflow.input.feature_slug }}-backend"
        echo "[backend] git checkout $base"
        {% for gid, out in implement.outputs.items() %}
        echo "[backend] merge slice {{ gid }} (worktree {{ out.worktree }})"
        # Real: git merge --no-ff "$base/{{ gid }}" -m "merge slice {{ gid }}"
        {% endfor %}
        echo "[backend] slices merged (disjoint writes -> no conflicts)"
        exit 0
    timeout: 600
    routes:
      - to: unit_tests

  # ---- 2. UNIT + INTEGRATION (deterministic gate) -------------------------
  - name: unit_tests
    type: script
    description: Run unit + integration tests in a clean env.
    command: bash
    args:
      - "-c"
      - |
        set -uo pipefail
        echo "[backend] kv up -> seed -> ready_check"
        echo "[backend] pytest (unit + integration)..."
        echo "[backend] unit+integration: PASS"
        exit 0
    timeout: 1800
    routes:
      - to: contract_check
        when: "exit_code == 0"
      - to: fix                       # failed check -> bounded fix (cap lives in the skill)

  # ---- 3. CONTRACT VERIFICATION (provider side) ---------------------------
  - name: contract_check
    type: script
    description: Provider-side contract verification (backend owns the contract).
    command: bash
    args:
      - "-c"
      - |
        set -uo pipefail
        echo "[backend] contract (provider) tests against {{ workflow.input.contract_path }}..."
        echo "[backend] contract: PASS"
        exit 0
    timeout: 600
    routes:
      - to: reviewers
        when: "exit_code == 0"
      - to: fix                       # failed contract check -> bounded fix

  # ---- 4. BACKEND REVIEW (/backend-review) -----------------------
  # Runs the backend-review skill (read-only). Writes findings; a blocking result escalates.
  - name: reviewers
    description: Run the backend-review skill.
    model: "{{ workflow.input.model.reviewers if workflow.input.model.reviewers is defined else 'claude-haiku-4-5' }}"
    prompt: |
      Run the **/backend-review** skill. Inputs:
      - feature:          {{ workflow.input.feature }}
      - feature_slug:     {{ workflow.input.feature_slug }}
      - branch:           feature/{{ workflow.input.feature_slug }}-backend
      - contract_summary: {{ workflow.input.contract_summary }}
      Return: review_path, blocking.
    output:
      review_path: { type: string }
      blocking: { type: boolean }
    routes:
      - to: impl_analyze              # blocking findings -> analyze + escalate (human-gated; still no silent auto-fix)
        when: "{{ output.blocking }}"
      - to: done

  # ---- 5. BOUNDED FIX (agent-owned retry; replaces the broken workflow loop) ----
  # Conductor has no per-edge iteration counter, so the "<= 3 attempts then stop"
  # bound lives INSIDE the fix-loop skill (which caps itself at 3), not in a
  # workflow route condition. This step fixes AND re-verifies in one turn and
  # reports resolved; the workflow stays acyclic (no counter needed).
  - name: fix
    description: Bounded fix + re-verify via the fix-loop skill (cap enforced in the skill).
    model: "{{ workflow.input.model.fix if workflow.input.model.fix is defined else 'claude-haiku-4-5' }}"
    prompt: |
      Run the **/fix** skill (bounded root-cause loop; cap enforced in the skill). After
      fixing, re-run the failed checks (unit + integration + provider-side contract) and
      return `resolved: true` only if all now pass, else `resolved: false` with a short reason.
      - feature_slug:     {{ workflow.input.feature_slug }}
      - branch:           feature/{{ workflow.input.feature_slug }}-backend
      - contract_summary: {{ workflow.input.contract_summary }}
      {% if impl_human_gate is defined %}
      A human reviewed the block and gave guidance. RESUME from the CURRENT branch
      and changes — do NOT re-implement from scratch. Apply this feedback, address
      any blocking review findings, then re-verify:
      {{ impl_human_gate.output.additional_input.feedback | default('') }}
      {% endif %}
    output:
      resolved: { type: boolean }
      summary: { type: string }
    routes:
      - to: reviewers
        when: "{{ output.resolved }}"
      - to: impl_analyze              # still failing -> analyze + escalate to a human (was: give_up)

  - name: done
    type: terminate
    status: success
    reason: "Backend green: tests + contract + backend review."
    output_template:
      branch: "feature/{{ workflow.input.feature_slug }}-backend"
      summary: "{{ implement.outputs | length }} slice(s) built"
      tests_passed: "true"
      review_path: "{{ reviewers.output.review_path }}"

  # ---- ANALYZE: fix exhausted OR review blocking -> diagnose for a human ----
  # Read-only: no code/test edits here. Turns a stuck build (failing checks or a
  # blocking review) into a plain summary + the specific open questions blocking
  # green, for the gate below.
  - name: impl_analyze
    description: Diagnose the stuck backend build (failing checks or blocking review) for a human.
    model: "{{ workflow.input.model.impl_analyze if workflow.input.model.impl_analyze is defined else 'claude-haiku-4-5' }}"
    prompt: |
      The backend build is stuck: either the bounded fix loop is exhausted with
      checks still red, or the review is blocking. ANALYZE only — do NOT edit code
      or tests in this step.

      Inputs:
      - feature:      {{ workflow.input.feature }}
      - feature_slug: {{ workflow.input.feature_slug }}
      - branch:       feature/{{ workflow.input.feature_slug }}-backend
      {% if reviewers is defined and reviewers.output.blocking %}- blocking review findings: {{ reviewers.output.review_path }}{% endif %}
      {% if fix is defined %}- last fix result: resolved={{ fix.output.resolved }} — {{ fix.output.summary }}{% endif %}

      Inspect the failing checks and/or the blocking review findings and the changes
      made so far, then produce:
      - summary: 3–6 sentences a teammate can follow — what is blocking (failing
        unit/integration/contract tests vs. a blocking review finding), the likely
        root cause, and what was already tried.
      - open_questions: a short markdown list of the SPECIFIC decisions or missing
        information you need from the human to unblock (e.g. an ambiguous contract
        detail, intended behavior, a risk to accept). Make each one actionable.
      Return: summary, open_questions.
    output:
      summary: { type: string }
      open_questions: { type: string }
    routes:
      - to: impl_human_gate

  # ---- HUMAN GATE: hand the analysis over; feedback loops back into fix ----
  - name: impl_human_gate
    type: human_gate
    description: Review the stuck-backend analysis; give feedback to retry, or give up.
    prompt: |
      ## Backend still blocked — needs your input — {{ workflow.input.feature }}

      The backend couldn't reach green on its own (failing checks or a blocking review).

      **Analysis:** {{ impl_analyze.output.summary }}

      **Open questions / decisions needed:**

      {{ impl_analyze.output.open_questions }}

      Branch: `feature/{{ workflow.input.feature_slug }}-backend`

      Choose **Provide feedback & retry** and type your guidance — the fix step
      resumes from the CURRENT branch and changes (it does not start over), applies
      your feedback, re-verifies, and re-reviews. Or **Give up** for manual handling.
    options:
      - label: "Provide feedback & retry"
        value: retry
        route: fix
        prompt_for: feedback
      - label: "Give up — needs manual handling"
        value: give-up
        route: give_up

  - name: give_up
    type: terminate
    status: failed
    reason: "Backend still failing — human chose to stop the retry loop; needs manual handling."

output:
  branch: "feature/{{ workflow.input.feature_slug }}-backend"
  summary: "{% if implement is defined %}{{ implement.outputs | length }} slice(s) built{% endif %}"
  tests_passed: "{% if reviewers is defined %}true{% else %}false{% endif %}"
  review_path: "{% if reviewers is defined %}{{ reviewers.output.review_path }}{% endif %}"
