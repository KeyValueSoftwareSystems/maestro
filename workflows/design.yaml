# Design phase: requirement -> HLD -> open-questions loop -> approval -> parallel LLDs
# -> API contract -> functional test cases.
#
# Showcases: script routing on stdout JSON (oq_serve), a human-in-the-loop cycle built
# from BACK-EDGES (no loop construct), a revise gate whose back-edge cascade-resets all
# downstream design artifacts, and a parallel fork.
version: 1
name: design
description: Design a feature end-to-end, from requirement folder to reviewed design artifacts.
inputs:
  slug: {type: string, required: true, description: kebab-case feature id}
  feature: {type: string, default: "${inputs.slug}", description: one-line feature summary}
  feedback: {type: string, default: "", description: revision note from a design-review gate (empty on first pass)}
defaults:
  model: haiku
  agent: planner
  max_visits: 10
start: assert_requirement
nodes:
  - id: assert_requirement
    type: script
    label: Requirement present?
    run: [python3, .maestro/engine/requirement_serve.py, ".maestro/runs/${inputs.slug}/requirement"]
    routes:
      - {when: "${steps.assert_requirement.outputs.state} == have", to: collect_references}
      - {to: requirement_intake}

  # ---- PRD phase: intake -> collect references -> author/refine the PRD -> Q&A loop ----
  # ALWAYS produces .maestro/runs/<slug>/requirement/prd.md before the HLD. If the user provided
  # a complete requirement it is consolidated into prd.md with no questions; otherwise the
  # gated Q&A loop (reusing the oq_* scripts on requirement-questions.json) fills the gaps.
  # requirement_intake is reached only when the folder is empty.
  - id: requirement_intake
    type: gate
    label: No requirement found
    prompt: |
      No requirement files in .maestro/runs/${inputs.slug}/requirement/.

      How do you want to supply the requirement for "${inputs.feature}"?
    options:
      - {id: add-files, label: I'll add files now — re-check, to: assert_requirement}
      - {id: brainstorm, label: Brainstorm it with me, to: collect_references}
      - {id: reject, label: Abort the run, to: abort}

  - id: collect_references
    type: gate
    label: Starting references
    prompt: |
      Optional: paste any references to ground the PRD for "${inputs.feature}" — Figma links,
      doc or file paths, tickets, URLs. Local paths are read; links that can't be opened are
      recorded in the PRD and turned into a question if their content matters. Or pick "none".
    options:
      - {id: provide, label: I have references to add, to: brainstorm_draft, input: refs}
      - {id: none, label: No references — continue, to: brainstorm_draft}

  - id: brainstorm_draft
    type: agent
    label: Author / refine the PRD
    instruction: |
      Produce the product requirement doc (PRD) for "${inputs.feature}" at
      .maestro/runs/${inputs.slug}/requirement/prd.md. Read EVERY file already in
      .maestro/runs/${inputs.slug}/requirement/ (a PRD, notes, mockups — may be empty) and fold in
      the provided references: ${steps.collect_references.outputs.refs}
      For local file paths, read them; for Figma/URLs/tickets you cannot open, record the link
      in the PRD's References section and (only if its content is decision-critical) raise it
      as a question — never invent its contents.

      Then write requirement-questions.json (schema .maestro/engine/schemas/open-questions.schema.json)
      with ONLY the remaining HIGH-LEVEL product/feature gaps — problem, users, scope, goals,
      constraints, acceptance — each with why it matters and 2-4 options. Do NOT ask
      design/technical/implementation questions (API, schema, components, tech choices) — those
      belong to the HLD downstream. If the inputs already form a COMPLETE PRD, just consolidate
      them into prd.md and write an EMPTY questions set (no fabricated questions). Assert
      nothing the user has not confirmed; do not ask the user anything directly.
    skill: brainstorm
    inputs:
      feature: "${inputs.feature}"
      slug: "${inputs.slug}"
      requirement_dir: ".maestro/runs/${inputs.slug}/requirement"
      references: "${steps.collect_references.outputs.refs}"
    outputs: [draft_summary]
    artifact: ".maestro/runs/${inputs.slug}/requirement/prd.md"
    max_visits: 3
    next: rq_serve

  - id: rq_serve
    type: script
    label: Next requirement question?
    run: [python3, .maestro/engine/oq_serve.py, ".maestro/runs/${inputs.slug}/requirement-questions.json"]
    max_visits: 40
    on_exhausted: author_hld
    routes:
      - {when: "${steps.rq_serve.outputs.state} == ask", to: rq_ask}
      - {when: "${steps.rq_serve.outputs.state} == refine", to: rq_fold}
      - {to: author_hld}

  - id: rq_ask
    type: gate
    label: Requirement question
    prompt: |
      **${steps.rq_serve.outputs.question}**

      Why it matters: ${steps.rq_serve.outputs.why}

      ${steps.rq_serve.outputs.options_md}

      Answer with an option number or free text.
    max_visits: 40
    options:
      - {id: answer, label: Answer it, to: rq_record, input: answer}
      - {id: you-decide, label: You decide (pick a sensible default), to: rq_record}
      - {id: skip, label: Skip — leave as an assumption, to: rq_record}

  - id: rq_record
    type: script
    label: Record answer
    run:
      - python3
      - .maestro/engine/oq_record.py
      - ".maestro/runs/${inputs.slug}/requirement-questions.json"
      - "${steps.rq_serve.outputs.qid}"
      - "${steps.rq_ask.outputs.choice}"
      - "${steps.rq_ask.outputs.answer}"
    max_visits: 40
    on_fail: abort
    next: rq_serve

  - id: rq_fold
    type: agent
    label: Fold answers into the PRD
    instruction: |
      Resolved requirement questions await folding. Apply each resolved answer to
      .maestro/runs/${inputs.slug}/requirement/prd.md ('you-decide' resolutions: pick a
      sensible default and record the choice), then mark those questions status "folded" in
      .maestro/runs/${inputs.slug}/requirement-questions.json and re-validate it with
      python3 .maestro/engine/validate_open_questions.py.
    skill: brainstorm
    inputs:
      slug: "${inputs.slug}"
    outputs: [refined_summary]
    artifact: ".maestro/runs/${inputs.slug}/requirement/prd.md"
    max_visits: 20
    next: rq_serve

  - id: author_hld
    type: agent
    label: Author HLD
    instruction: |
      Write the high-level design for this feature. Read EVERY file in the requirement
      folder as the requirement. Surface unresolved product/technical decisions as open
      questions: write them to BOTH the HLD's "Open questions" section AND
      .maestro/runs/${inputs.slug}/open-questions.json (schema
      .maestro/engine/schemas/open-questions.schema.json). Do not ask the user anything directly.
      If a previous review left feedback, honour it: ${steps.hld_approval.outputs.feedback} ${inputs.feedback}
    skill: plan
    inputs:
      feature: "${inputs.feature}"
      slug: "${inputs.slug}"
      requirement_dir: ".maestro/runs/${inputs.slug}/requirement"
      codebase_lessons: "${memory.knowledge.codebase}"
      lessons: "${memory.knowledge.plan}"
    outputs: [hld_summary]
    artifact: ".maestro/runs/${inputs.slug}/hld.md"
    max_visits: 5
    next: oq_serve

  # ---- open-questions cycle: serve -> ask -> record -> serve (back-edges) ----
  - id: oq_serve
    type: script
    label: Next open question?
    run: [python3, .maestro/engine/oq_serve.py, ".maestro/runs/${inputs.slug}/open-questions.json"]
    max_visits: 40
    on_exhausted: hld_approval
    routes:
      - {when: "${steps.oq_serve.outputs.state} == ask", to: oq_ask}
      - {when: "${steps.oq_serve.outputs.state} == refine", to: refine_hld}
      - {to: hld_approval}

  - id: oq_ask
    type: gate
    label: Open question
    prompt: |
      **${steps.oq_serve.outputs.question}**

      Why it matters: ${steps.oq_serve.outputs.why}

      ${steps.oq_serve.outputs.options_md}

      Answer with an option number or free text.
    max_visits: 40
    options:
      - {id: answer, label: Answer it, to: oq_record, input: answer}
      - {id: you-decide, label: You decide (pick a sensible default), to: oq_record}
      - {id: skip, label: Skip — defer to LLD, to: oq_record}

  - id: oq_record
    type: script
    label: Record answer
    run:
      - python3
      - .maestro/engine/oq_record.py
      - ".maestro/runs/${inputs.slug}/open-questions.json"
      - "${steps.oq_serve.outputs.qid}"
      - "${steps.oq_ask.outputs.choice}"
      - "${steps.oq_ask.outputs.answer}"
    max_visits: 40
    on_fail: abort
    next: oq_serve

  - id: refine_hld
    type: agent
    label: Fold answers into HLD
    instruction: |
      Resolved open questions await folding into the HLD. Apply each resolved answer to
      .maestro/runs/${inputs.slug}/hld.md ('you-decide' resolutions: pick a sensible default
      and record the choice), then mark those questions status "folded" in
      .maestro/runs/${inputs.slug}/open-questions.json and re-validate it with
      python3 .maestro/engine/validate_open_questions.py.
    skill: plan
    inputs:
      slug: "${inputs.slug}"
    outputs: [refined_summary]
    artifact: ".maestro/runs/${inputs.slug}/hld.md"
    max_visits: 20
    next: oq_serve

  - id: hld_approval
    type: gate
    label: HLD approval
    prompt: |
      HLD ready at .maestro/runs/${inputs.slug}/hld.md — ${steps.author_hld.outputs.hld_summary}

      Review the document, then choose.
    options:
      - {id: approve, label: Approve — write the detailed designs, to: author_llds}
      - {id: revise, label: Request revisions (regenerates everything downstream), to: author_hld, input: feedback}
      - {id: reject, label: Reject — abort the run, to: abort}

  - id: author_llds
    type: parallel
    label: Detailed designs
    join: all
    on_branch_fail: ask
    branches:
      - id: backend
        start: backend_design
        steps:
          - id: backend_design
            type: agent
            instruction: |
              Write the backend low-level design from the approved HLD at
              .maestro/runs/${inputs.slug}/hld.md.
            skill: backend-design
            inputs: {slug: "${inputs.slug}", feature: "${inputs.feature}", lessons: "${memory.knowledge.backend-design}"}
            outputs: [lld_path, contract_notes]
            artifact: ".maestro/runs/${inputs.slug}/lld/backend.md"
            next: end
      - id: frontend
        start: frontend_design
        steps:
          - id: frontend_design
            type: agent
            instruction: |
              Write the frontend low-level design from the approved HLD at
              .maestro/runs/${inputs.slug}/hld.md.
            skill: frontend-design
            inputs: {slug: "${inputs.slug}", feature: "${inputs.feature}", lessons: "${memory.knowledge.frontend-design}"}
            outputs: [lld_path, contract_notes]
            artifact: ".maestro/runs/${inputs.slug}/lld/frontend.md"
            next: end
    next: contract

  - id: contract
    type: agent
    label: API contract
    instruction: |
      Reconcile the backend and frontend LLDs under .maestro/runs/${inputs.slug}/lld/ into a
      single OpenAPI contract. Flag any mismatch you had to resolve.
    skill: api-contract
    inputs: {slug: "${inputs.slug}", feature: "${inputs.feature}"}
    outputs: [contract_summary]
    artifact: ".maestro/runs/${inputs.slug}/openapi.yaml"
    next: test_cases

  - id: test_cases
    type: agent
    label: Functional test cases
    instruction: |
      Produce the functional test-case catalog for this feature from the HLD, LLDs and
      contract — the QA source of truth.
    skill: functional-testcases
    inputs: {slug: "${inputs.slug}", feature: "${inputs.feature}"}
    outputs: [test_cases_path, case_count]
    artifact: ".maestro/runs/${inputs.slug}/test-cases.md"
    next: end

outputs:
  hld_summary: "${steps.author_hld.outputs.hld_summary}"
  contract_summary: "${steps.contract.outputs.contract_summary}"
  hld_path: ".maestro/runs/${inputs.slug}/hld.md"
  contract_path: ".maestro/runs/${inputs.slug}/openapi.yaml"
  test_cases_path: ".maestro/runs/${inputs.slug}/test-cases.md"
