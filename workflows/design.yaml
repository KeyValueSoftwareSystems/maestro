# =============================================================================
# KeyValue AI-SDLC  ::  design.yaml — HLD -> approve -> LLD + CONTRACT
# =============================================================================
# The whole design phase in one workflow. Runnable directly:
#   conductor run design.yaml --web --input feature="..." --input feature_slug="saved-search"
# Composed by main.yaml as the design step.
#
# Flow:
#   assert_prd (PRD exists?) -> author_hld (/plan) -> assert hld.md
#     -> open-question loop:  serve -> ask_question -> record_answer -> serve
#                             serve -> refine_hld -> serve   (until resolved)
#     -> HUMAN approve
#     -> backend_design ∥ frontend_design   (parallel — author per-stack LLDs)
#        -> contract (/api-contract: reconcile the LLDs into the cross-repo OpenAPI
#           contract + acceptance criteria)
#
# NOTE: this workflow contains a human_gate (HLD approval). Run it with `--web`.
# When composed by main.yaml it runs as a nested sub-workflow — verify your
# Conductor surfaces the nested gate to the parent run.
#
# Artifacts:
#   docs/technical/<slug>/hld.md
#   docs/technical/<slug>/lld/backend.md
#   docs/technical/<slug>/lld/frontend.md
#   contracts/<slug>/openapi.yaml
#   docs/functional/<slug>/acceptance-criteria.md
# =============================================================================

workflow:
  name: sdlc-design
  description: HLD -> human approval -> per-stack LLDs (parallel) -> cross-repo contract.
  entry_point: assert_prd

  instructions:
    - >-
      Each step invokes an installed skill by name; the skill owns its own behavior.
      Write each artifact to the path the skill resolves from skills.config.yaml
      `artifacts:` before returning.

  runtime:
    provider: claude-agent-sdk
    default_model: claude-haiku-4-5

  limits:
    max_iterations: 128            # headroom for the open-question loop (serve/ask/record/refine per question)
    timeout_seconds: 4200

  input:
    feature:
      type: string
      required: true
    feature_slug:
      type: string
      required: true
    prd_path:
      type: string
      required: false
      default: "./docs/business/prd.md"
      description: Path to the PRD artifact (assumed to exist).

# ----------------------------------------------------------------------------
# Parallel LLD authoring: backend + frontend, concurrent (after HLD approval).
# (parallel groups allow only agent steps — the design agents qualify.)
# ----------------------------------------------------------------------------
parallel:
  - name: author_llds
    description: Author the backend and frontend LLDs in parallel.
    failure_mode: all_or_nothing
    agents: [backend_design, frontend_design]
    routes:
      - to: contract

agents:
  # ---- 0. ASSERT the PRD exists (fail fast, before /plan) ------------------
  - name: assert_prd
    type: script
    description: Verify the PRD exists before designing, so a missing PRD fails clearly.
    command: bash
    args:
      - "-c"
      - |
        set -uo pipefail
        f="{{ workflow.input.prd_path }}"
        if [ -s "$f" ]; then echo "[prd] OK: $f"; exit 0
        else echo "[prd] NOT FOUND (or empty): $f — create the PRD before running the design phase." >&2; exit 1; fi
    routes:
      - to: author_hld
        when: "exit_code == 0"
      - to: abort

  # ---- 1. PLAN — author the HLD (/plan) -----------------------------------
  - name: author_hld
    description: Produce the high-level design (HLD) via the plan skill.
    model: claude-opus-4-8            # design judgement (per-step override; SoT for the model)
    prompt: |
      Run the **/plan** skill. Inputs:
      - feature:      {{ workflow.input.feature }}
      - feature_slug: {{ workflow.input.feature_slug }}
      - prd_path:     {{ workflow.input.prd_path }}
      Return: hld_path, hld_summary. Write open questions to BOTH the HLD's
      "Open questions" section AND `.sdlc/{{ workflow.input.feature_slug }}/open-questions.json`
      (per workflows/open-questions.schema.json — each question with `why` and
      2–4 suggested `options`, `status: open`, `resolution: null`). Do NOT return
      open questions as a structured output field.
    output:
      hld_path: { type: string }
      hld_summary: { type: string }
    routes:
      - to: assert_hld

  # ---- 1b. ASSERT the HLD artifact exists ---------------------------------
  - name: assert_hld
    type: script
    description: Verify the HLD artifact was created (deterministic proof).
    command: bash
    args:
      - "-c"
      - |
        set -uo pipefail
        f="docs/technical/{{ workflow.input.feature_slug }}/hld.md"
        if [ -s "$f" ]; then echo "[artifact] OK: $f ($(wc -l < "$f" | tr -d ' ') lines)"; exit 0
        else echo "[artifact] MISSING/EMPTY: $f" >&2; exit 1; fi
    routes:
      - to: serve
        when: "exit_code == 0"
      - to: abort

  # ---- 1c. OPEN-QUESTION LOOP: serve -> ask -> record -> refine -----------
  # A script-driven state machine that resolves the HLD's open questions one at
  # a time (Claude AskUserQuestion-style), then loops until none remain:
  #   serve --(open)--> ask_question --> record_answer --> serve
  #   serve --(resolved-unfolded)--> refine_hld --> serve
  #   serve --(none)--> hld_approval
  # Questions live in .sdlc/<slug>/open-questions.json (never an agent output
  # field — that shape failed schema validation before).
  - name: serve
    type: script
    description: Decide the next open-question loop state (ask / refine / approve).
    command: python3
    args:
      - "workflows/oq_serve.py"
      - ".sdlc/{{ workflow.input.feature_slug }}/open-questions.json"
    routes:
      - to: ask_question
        when: "exit_code == 0 and state == 'ask'"
      - to: refine_hld
        when: "exit_code == 0 and state == 'refine'"
      - to: hld_approval
        when: "exit_code == 0 and state == 'approve'"
      - to: abort

  - name: ask_question
    type: human_gate
    description: Answer one open question — pick a suggestion, decide, or defer.
    prompt: |
      ## Open question — {{ workflow.input.feature }}

      **{{ serve.output.question }}**

      _Why this matters:_ {{ serve.output.why }}

      Suggested answers:

      {{ serve.output.options_md }}

      Choose **Answer** and type a suggestion number (or your own wording),
      **You decide** to let the plan pick a sensible default (recorded as a stated
      assumption), or **Skip / defer** to carry this question forward to the LLD.
    options:
      - label: "Answer"
        value: answer
        route: record_answer
        prompt_for: answer
      - label: "You decide"
        value: you-decide
        route: record_answer
      - label: "Skip / defer"
        value: skip
        route: record_answer

  - name: record_answer
    type: script
    description: Record the gate answer into open-questions.json, then loop back to serve.
    command: python3
    args:
      - "workflows/oq_record.py"
      - ".sdlc/{{ workflow.input.feature_slug }}/open-questions.json"
      - "{{ serve.output.qid }}"
      - "{{ ask_question.output.selected }}"
      - "{{ ask_question.output.additional_input.answer | default('') }}"
    routes:
      - to: serve
        when: "exit_code == 0"
      - to: abort

  - name: refine_hld
    description: Fold answered questions into the HLD, then re-derive open questions.
    model: claude-opus-4-8            # design judgement (per-step override; SoT for the model)
    prompt: |
      Refine the HLD at `docs/technical/{{ workflow.input.feature_slug }}/hld.md`
      using the answers in `.sdlc/{{ workflow.input.feature_slug }}/open-questions.json`.

      For every question with `"status": "resolved"`:
      - Fold its `resolution.answer` into the relevant HLD section(s). For kind
        `you-decide`, choose a sensible default and record it explicitly as a
        **stated assumption** in the HLD.
      - Set that question's `"status"` to `"folded"`.
      Leave `deferred` questions untouched — they stay in the HLD "Open questions"
      section and do not block approval.

      Then re-examine the refined HLD and append any GENUINELY NEW, blocking open
      questions as new entries (unique `id`, `status: open`, `resolution: null`,
      2–4 suggested `options`, a `why`). Do NOT re-add answered or deferred
      questions. If nothing new is blocking, add none.

      Keep `open-questions.json` valid (validate with
      `python3 workflows/validate_open_questions.py .sdlc/{{ workflow.input.feature_slug }}/open-questions.json`)
      and update the HLD's "Open questions" prose section to match.
      Return hld_summary (2–3 sentences).
    output:
      hld_summary: { type: string }
    routes:
      - to: serve

  # ---- 2. HUMAN APPROVAL: HLD ---------------------------------------------
  - name: hld_approval
    type: human_gate
    description: Review the high-level design before detailed design.
    prompt: |
      ## HLD Review — {{ workflow.input.feature }}

      Artifact: `docs/technical/{{ workflow.input.feature_slug }}/hld.md`

      **Summary:** {{ author_hld.output.hld_summary }}

      **Open questions:** all blocking questions were resolved in the open-question
      loop above. Any that remain in the HLD "Open questions" section were
      explicitly deferred to the LLD.

      Approve to proceed to detailed design (per-stack LLDs), or reject.
    options:
      - label: "Approve — proceed to LLD"
        value: approve
        route: author_llds
      - label: "Reject — abort"
        value: reject
        route: abort

  # ---- 3. PER-STACK LLDs (parallel) ---------------------------------------
  - name: backend_design
    description: Author the backend LLD via the backend-design skill.
    prompt: |
      Run the **/backend-design** skill. Inputs:
      - feature:      {{ workflow.input.feature }}
      - feature_slug: {{ workflow.input.feature_slug }}
      - hld_path:     {{ author_hld.output.hld_path }}
      Return: lld_path, tasks_path.
    output:
      lld_path: { type: string }
      tasks_path: { type: string }

  - name: frontend_design
    description: Author the frontend LLD via the frontend-design skill.
    prompt: |
      Run the **/frontend-design** skill. Inputs:
      - feature:      {{ workflow.input.feature }}
      - feature_slug: {{ workflow.input.feature_slug }}
      - hld_path:     {{ author_hld.output.hld_path }}
      Return: lld_path, tasks_path.
    output:
      lld_path: { type: string }
      tasks_path: { type: string }

  # ---- 4. CONTRACT (/api-contract) ----------------------------------------
  - name: contract
    description: Reconcile the per-stack LLDs into the cross-repo contract via the api-contract skill.
    model: claude-opus-4-8            # contract reconciliation (per-step override; SoT for the model)
    prompt: |
      Run the **/api-contract** skill (the per-stack LLDs have already been written — pass them).
      Inputs:
      - feature:      {{ workflow.input.feature }}
      - feature_slug: {{ workflow.input.feature_slug }}
      - hld_path:     {{ author_hld.output.hld_path }}
      - backend_lld:  {{ author_llds.outputs.backend_design.lld_path }}
      - frontend_lld: {{ author_llds.outputs.frontend_design.lld_path }}
      Return: contract_path, contract_summary, affected_repos, acceptance_criteria.
    output:
      contract_path: { type: string }
      contract_summary:
        type: string
        description: Human-readable cross-repo contract (breaking changes flagged).
      affected_repos:
        type: array
        description: 'e.g. [{"name":"backend"},{"name":"frontend"}].'
      acceptance_criteria:
        type: string
    routes:
      - to: $end

  - name: abort
    type: terminate
    status: failed
    reason: "Design aborted (missing PRD or HLD artifact, or HLD rejected)."

# The output block is rendered on EVERY termination — including `abort` before the
# later steps run. So paths are literal (deterministic, per skills.config.yaml
# artifacts.*) and every step-output reference is guarded with `is defined`, so an
# early abort terminates cleanly instead of raising a TemplateError. (Same defensive
# pattern as main.yaml's `{% if implement is defined %}` outputs.)
output:
  hld_path:  "docs/technical/{{ workflow.input.feature_slug }}/hld.md"
  open_questions_path: ".sdlc/{{ workflow.input.feature_slug }}/open-questions.json"
  hld_summary:    "{% if refine_hld is defined %}{{ refine_hld.output.hld_summary }}{% elif author_hld is defined %}{{ author_hld.output.hld_summary }}{% endif %}"
  backend_lld_path:  "docs/technical/{{ workflow.input.feature_slug }}/lld/backend.md"
  frontend_lld_path: "docs/technical/{{ workflow.input.feature_slug }}/lld/frontend.md"
  backend_tasks_path:  ".sdlc/{{ workflow.input.feature_slug }}/backend/tasks.json"
  frontend_tasks_path: ".sdlc/{{ workflow.input.feature_slug }}/frontend/tasks.json"
  contract_path: "contracts/{{ workflow.input.feature_slug }}/openapi.yaml"
  contract_summary:    "{% if contract is defined %}{{ contract.output.contract_summary }}{% endif %}"
  affected_repos:      "{% if contract is defined %}{{ contract.output.affected_repos | json }}{% endif %}"
  acceptance_criteria: "{% if contract is defined %}{{ contract.output.acceptance_criteria }}{% endif %}"
