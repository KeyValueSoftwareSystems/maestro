# Design phase: requirement -> HLD -> open-questions loop -> approval -> parallel LLDs
# -> API contract -> functional test cases.
#
# Showcases: script routing on stdout JSON (oq_serve), a human-in-the-loop cycle built
# from BACK-EDGES (no loop construct), a revise gate whose back-edge cascade-resets all
# downstream design artifacts, and a parallel fork.
version: 1
name: design
description: Design a feature end-to-end, from requirement folder to reviewed design artifacts.
inputs:
  slug: {type: string, required: true, description: kebab-case feature id}
  feature: {type: string, default: "${inputs.slug}", description: one-line feature summary}
  feedback: {type: string, default: "", description: revision note from a design-review gate (empty on first pass)}
defaults:
  model: haiku
  agent: planner
  max_visits: 10
start: assert_requirement
nodes:
  - id: assert_requirement
    type: script
    label: Requirement present?
    run: [bash, -c, "find .maestro/${inputs.slug}/requirement -type f -size +1c 2>/dev/null | grep -q ."]
    on_fail: abort
    next: author_hld

  - id: author_hld
    type: agent
    label: Author HLD
    instruction: |
      Write the high-level design for this feature. Read EVERY file in the requirement
      folder as the requirement. Surface unresolved product/technical decisions as open
      questions: write them to BOTH the HLD's "Open questions" section AND
      .maestro/${inputs.slug}/open-questions.json (schema
      engine/schemas/open-questions.schema.json). Do not ask the user anything directly.
      If a previous review left feedback, honour it: ${steps.hld_approval.outputs.feedback} ${inputs.feedback}
    skill: plan
    inputs:
      feature: "${inputs.feature}"
      slug: "${inputs.slug}"
      requirement_dir: ".maestro/${inputs.slug}/requirement"
    outputs: [hld_summary]
    artifact: ".maestro/${inputs.slug}/hld.md"
    max_visits: 5
    next: oq_serve

  # ---- open-questions cycle: serve -> ask -> record -> serve (back-edges) ----
  - id: oq_serve
    type: script
    label: Next open question?
    run: [python3, engine/oq_serve.py, ".maestro/${inputs.slug}/open-questions.json"]
    max_visits: 40
    on_exhausted: hld_approval
    routes:
      - {when: "${steps.oq_serve.outputs.state} == ask", to: oq_ask}
      - {when: "${steps.oq_serve.outputs.state} == refine", to: refine_hld}
      - {to: hld_approval}

  - id: oq_ask
    type: gate
    label: Open question
    prompt: |
      **${steps.oq_serve.outputs.question}**

      Why it matters: ${steps.oq_serve.outputs.why}

      ${steps.oq_serve.outputs.options_md}

      Answer with an option number or free text.
    max_visits: 40
    options:
      - {id: answer, label: Answer it, to: oq_record, input: answer}
      - {id: you-decide, label: You decide (pick a sensible default), to: oq_record}
      - {id: skip, label: Skip — defer to LLD, to: oq_record}

  - id: oq_record
    type: script
    label: Record answer
    run:
      - python3
      - engine/oq_record.py
      - ".maestro/${inputs.slug}/open-questions.json"
      - "${steps.oq_serve.outputs.qid}"
      - "${steps.oq_ask.outputs.choice}"
      - "${steps.oq_ask.outputs.answer}"
    max_visits: 40
    on_fail: abort
    next: oq_serve

  - id: refine_hld
    type: agent
    label: Fold answers into HLD
    instruction: |
      Resolved open questions await folding into the HLD. Apply each resolved answer to
      .maestro/${inputs.slug}/hld.md ('you-decide' resolutions: pick a sensible default
      and record the choice), then mark those questions status "folded" in
      .maestro/${inputs.slug}/open-questions.json and re-validate it with
      python3 engine/validate_open_questions.py.
    skill: plan
    inputs:
      slug: "${inputs.slug}"
    outputs: [refined_summary]
    artifact: ".maestro/${inputs.slug}/hld.md"
    max_visits: 20
    next: oq_serve

  - id: hld_approval
    type: gate
    label: HLD approval
    prompt: |
      HLD ready at .maestro/${inputs.slug}/hld.md — ${steps.author_hld.outputs.hld_summary}

      Review the document, then choose.
    options:
      - {id: approve, label: Approve — write the detailed designs, to: author_llds}
      - {id: revise, label: Request revisions (regenerates everything downstream), to: author_hld, input: feedback}
      - {id: reject, label: Reject — abort the run, to: abort}

  - id: author_llds
    type: parallel
    label: Detailed designs
    join: all
    on_branch_fail: ask
    branches:
      - id: backend
        start: backend_design
        steps:
          - id: backend_design
            type: agent
            instruction: |
              Write the backend low-level design from the approved HLD at
              .maestro/${inputs.slug}/hld.md.
            skill: backend-design
            inputs: {slug: "${inputs.slug}", feature: "${inputs.feature}"}
            outputs: [lld_path, contract_notes]
            artifact: ".maestro/${inputs.slug}/lld/backend.md"
            next: end
      - id: frontend
        start: frontend_design
        steps:
          - id: frontend_design
            type: agent
            instruction: |
              Write the frontend low-level design from the approved HLD at
              .maestro/${inputs.slug}/hld.md.
            skill: frontend-design
            inputs: {slug: "${inputs.slug}", feature: "${inputs.feature}"}
            outputs: [lld_path, contract_notes]
            artifact: ".maestro/${inputs.slug}/lld/frontend.md"
            next: end
    next: contract

  - id: contract
    type: agent
    label: API contract
    instruction: |
      Reconcile the backend and frontend LLDs under .maestro/${inputs.slug}/lld/ into a
      single OpenAPI contract. Flag any mismatch you had to resolve.
    skill: api-contract
    inputs: {slug: "${inputs.slug}", feature: "${inputs.feature}"}
    outputs: [contract_summary]
    artifact: ".maestro/${inputs.slug}/openapi.yaml"
    next: test_cases

  - id: test_cases
    type: agent
    label: Functional test cases
    instruction: |
      Produce the functional test-case catalog for this feature from the HLD, LLDs and
      contract — the QA source of truth.
    skill: functional-testcases
    inputs: {slug: "${inputs.slug}", feature: "${inputs.feature}"}
    outputs: [test_cases_path, case_count]
    artifact: ".maestro/${inputs.slug}/test-cases.md"
    next: end

outputs:
  hld_summary: "${steps.author_hld.outputs.hld_summary}"
  contract_summary: "${steps.contract.outputs.contract_summary}"
  hld_path: ".maestro/${inputs.slug}/hld.md"
  contract_path: ".maestro/${inputs.slug}/openapi.yaml"
  test_cases_path: ".maestro/${inputs.slug}/test-cases.md"
