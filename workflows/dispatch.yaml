# =============================================================================
# KeyValue AI-SDLC  ::  dispatch.yaml (thin parallel dispatcher)
# =============================================================================
# Glue ONLY. main.yaml's for_each runs this once per stack (concurrently); it
# routes by `stack` to the STANDALONE pipeline files. Exists solely because
# Conductor's for_each needs a single static sub-workflow path. Developers run
# backend_impl.yaml / frontend_impl.yaml directly — this is just fan-out glue.
# Nesting: main -> dispatch -> backend_impl|frontend_impl (depth 2 of max 10).
# =============================================================================

workflow:
  name: sdlc-dispatch
  description: Route a build to the backend or frontend standalone pipeline by stack.
  entry_point: route

  runtime:
    provider: claude-agent-sdk
    default_model: ${KV_MODEL_DEFAULT:-claude-haiku-4-5}   # global default; see workflows/workflow.config.yaml `models:`

  limits:
    max_iterations: 8
    timeout_seconds: 3000

  input:
    stack:
      type: string
      required: true
      description: Which stack to build — backend or frontend.
    feature:
      type: string
      required: true
    feature_slug:
      type: string
      required: true
    contract_summary:
      type: string
      required: true
    contract_path:
      type: string
      required: false
      default: ""
    lld_path:
      type: string
      required: false
      default: ""

agents:
  - name: route
    type: set
    value: "{{ workflow.input.stack }}"
    routes:
      - to: run_backend
        when: "{{ output == 'backend' }}"
      - to: run_frontend
        when: "{{ output == 'frontend' }}"
      - to: bad_stack

  - name: run_backend
    type: workflow
    workflow: ./backend_impl.yaml
    input_mapping:
      feature: "{{ workflow.input.feature }}"
      feature_slug: "{{ workflow.input.feature_slug }}"
      contract_summary: "{{ workflow.input.contract_summary }}"
      contract_path: "{{ workflow.input.contract_path }}"
      lld_path: "{{ workflow.input.lld_path }}"
    # Outputs come from the child pipeline's own `output:` block (a `type: workflow`
    # step must not redeclare output); surfaced via this file's `output:` mapping below.
    routes:
      - to: $end

  - name: run_frontend
    type: workflow
    workflow: ./frontend_impl.yaml
    input_mapping:
      feature: "{{ workflow.input.feature }}"
      feature_slug: "{{ workflow.input.feature_slug }}"
      contract_summary: "{{ workflow.input.contract_summary }}"
      contract_path: "{{ workflow.input.contract_path }}"
      lld_path: "{{ workflow.input.lld_path }}"
    # Outputs come from the child pipeline's own `output:` block (a `type: workflow`
    # step must not redeclare output); surfaced via this file's `output:` mapping below.
    routes:
      - to: $end

  - name: bad_stack
    type: terminate
    status: failed
    reason: "Unknown stack '{{ workflow.input.stack }}' (expected backend|frontend)."

# Surface whichever pipeline ran (Jinja conditionals are lazy).
output:
  branch: "{{ run_backend.output.branch if workflow.input.stack == 'backend' else run_frontend.output.branch }}"
  summary: "{{ run_backend.output.summary if workflow.input.stack == 'backend' else run_frontend.output.summary }}"
  tests_passed: "{{ run_backend.output.tests_passed if workflow.input.stack == 'backend' else run_frontend.output.tests_passed }}"
  review_path: "{{ run_backend.output.review_path if workflow.input.stack == 'backend' else run_frontend.output.review_path }}"
