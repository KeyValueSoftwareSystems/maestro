# =============================================================================
# KeyValue AI-SDLC  ::  frontend_impl.yaml (standalone sub-workflow) — FRONTEND
# =============================================================================
# Runnable directly:
#   conductor run frontend_impl.yaml --input feature="..." \
#     --input feature_slug="saved-search" --input contract_summary="GET /searches ..."
# Composed by main.yaml (via dispatch.yaml). Also `/frontend-impl`.
#
# Flow (guide: task split -> execute UI states -> tests -> verify a11y -> reviewer):
#   tasks (load-or-author tasks.json) -> implement (for_each over independent slices,
#   parallel) -> merge_slices -> tests -> verify -> review
#       -> component tests -> Playwright E2E -> a11y gate  (deterministic)
#         -> the frontend-review skill
# Loops: failed check -> implementer (max 3); reviewer changes -> implementer (max 3).
# =============================================================================

workflow:
  name: sdlc-frontend-impl
  description: Frontend — implement UI states, component + E2E tests, a11y, review.
  entry_point: tasks

  instructions:
    - >-
      Each step invokes an installed skill by name; the skill owns its own behavior.
      Write each artifact to the path the skill resolves from skills.config.yaml
      `artifacts:` before returning.

  runtime:
    provider: claude-agent-sdk
    default_model: claude-haiku-4-5   # backstop for any agent without an explicit model:

  limits:
    max_iterations: 32
    timeout_seconds: 3000

  input:
    feature:
      type: string
      required: true
    feature_slug:
      type: string
      required: true
    contract_summary:
      type: string
      required: true
      description: The cross-repo contract the frontend consumes.
    contract_path:
      type: string
      required: false
      default: ""
    lld_path:
      type: string
      required: false
      default: ""
    model:
      type: object
      required: false
      default: {}
      description: >
        Per-agent model overrides, keyed by agent name. Any agent not listed
        falls back to claude-haiku-4-5.

# ----------------------------------------------------------------------------
# Fan-out: one isolated build per INDEPENDENT slice, concurrently (disjoint writes).
# ----------------------------------------------------------------------------
# NOTE: this for_each uses a prompt-only inline agent (unlike main.yaml's type:workflow shape).
# Provisional pending Conductor validation — if the runtime rejects it, wrap the slice/scenario
# build in a one-step sub-workflow (the prompt is unchanged).
for_each:
  - name: implement
    type: for_each
    description: Build independent frontend slices in parallel (each slice = ordered tasks).
    source: tasks.output.slices
    as: slice
    key_by: slice.group_id
    max_concurrent: 3
    failure_mode: all_or_nothing
    agent:
      name: build_slice
      model: "{{ workflow.input.model.build_slice if workflow.input.model.build_slice is defined else 'claude-haiku-4-5' }}"
      max_agent_iterations: 100
      prompt: |
        Run the **/frontend-impl** skill in SLICE mode — implement ONLY this slice. Inputs:
        - feature:          {{ workflow.input.feature }}
        - feature_slug:     {{ workflow.input.feature_slug }}
        - group_id:         {{ slice.group_id }}
        - tasks_path:       {{ tasks.output.tasks_path }}
        - branch:           feature/{{ workflow.input.feature_slug }}-frontend-{{ slice.group_id }}
        - contract_summary (frontend CONSUMES this exactly): {{ workflow.input.contract_summary }}
        Batch-load the context manifest in one call; run the slice's tasks in dependency order,
        test-first, wiring every required UI state, in an isolated worktree. Return: worktree, tasks_done.
      output:
        worktree: { type: string }
        tasks_done: { type: array }
    routes:
      - to: merge_slices

agents:
  # ---- 0. TASK DAG (load design-phase tasks.json, else author via /frontend-impl plan) ----
  - name: tasks
    description: Load-or-author the task DAG (tasks.json) and return the fan-out slices.
    model: "{{ workflow.input.model.tasks if workflow.input.model.tasks is defined else 'claude-haiku-4-5' }}"
    prompt: |
      Ensure `.maestro/{{ workflow.input.feature_slug }}/frontend/tasks.json` exists and is valid:
      - If present (authored by /frontend-design), validate it:
        `python3 workflows/validate_tasks.py .maestro/{{ workflow.input.feature_slug }}/frontend/tasks.json`
      - If absent, run **/frontend-impl** in PLAN mode to author it (JSON, schema-valid), then validate.
      Inputs:
      - feature:          {{ workflow.input.feature }}
      - contract_summary: {{ workflow.input.contract_summary }}
      {% if workflow.input.lld_path %}- lld_path: {{ workflow.input.lld_path }}{% endif %}
      Return: tasks_path, slices.
    output:
      tasks_path: { type: string }
      slices: { type: array }
    routes:
      - to: implement

  # ---- 1b. MERGE SLICES (conflict-free by the disjoint-writes invariant) ---
  - name: merge_slices
    type: script
    description: Merge each slice's worktree branch onto the stack branch, then test once.
    command: bash
    args:
      - "-c"
      - |
        set -uo pipefail
        base="feature/{{ workflow.input.feature_slug }}-frontend"
        {% for gid, out in implement.outputs.items() %}
        echo "[frontend] merge slice {{ gid }} (worktree {{ out.worktree }})"
        {% endfor %}
        echo "[frontend] slices merged (disjoint writes -> no conflicts)"
        exit 0
    timeout: 600
    routes:
      - to: component_tests

  - name: component_tests
    type: script
    description: Component + unit tests (Vitest/Jest).
    command: bash
    args:
      - "-c"
      - |
        set -uo pipefail
        echo "[frontend] npm test (component + unit)..."
        echo "[frontend] component: PASS"
        exit 0
    timeout: 900
    routes:
      - to: e2e_tests
        when: "exit_code == 0"
      - to: fix                       # failed check -> bounded fix (cap lives in the skill)

  - name: e2e_tests
    type: script
    description: Playwright E2E in a live env.
    command: bash
    args:
      - "-c"
      - |
        set -uo pipefail
        echo "[frontend] kv up -> seed -> ready_check"
        echo "[frontend] npx playwright test..."
        echo "[frontend] e2e: PASS"
        exit 0
    timeout: 1800
    routes:
      - to: a11y
        when: "exit_code == 0"
      - to: fix                       # failed E2E -> bounded fix

  - name: a11y
    type: script
    description: Accessibility audit (axe) — WCAG AA gate.
    command: bash
    args:
      - "-c"
      - |
        set -uo pipefail
        echo "[frontend] axe accessibility audit (WCAG AA)..."
        echo "[frontend] a11y: PASS"
        exit 0
    timeout: 600
    routes:
      - to: reviewers
        when: "exit_code == 0"
      - to: fix                       # failed a11y gate -> bounded fix

  # ---- FRONTEND REVIEW (/frontend-review) -
  - name: reviewers
    description: Run the frontend-review skill.
    model: "{{ workflow.input.model.reviewers if workflow.input.model.reviewers is defined else 'claude-haiku-4-5' }}"
    prompt: |
      Run the **/frontend-review** skill. Inputs:
      - feature:      {{ workflow.input.feature }}
      - feature_slug: {{ workflow.input.feature_slug }}
      - branch:       feature/{{ workflow.input.feature_slug }}-frontend
      Return: review_path, blocking.
    output:
      review_path: { type: string }
      blocking: { type: boolean }
    routes:
      - to: give_up                   # blocking findings -> escalate to a human
        when: "{{ output.blocking }}"
      - to: done

  # ---- BOUNDED FIX (agent-owned retry; replaces the broken workflow loop) ----
  # No per-edge counter exists in Conductor, so the "<= 3 attempts then stop" bound
  # lives INSIDE the fix-loop skill. This step fixes AND re-verifies in one turn.
  - name: fix
    description: Bounded fix + re-verify via the fix-loop skill (cap enforced in the skill).
    model: "{{ workflow.input.model.fix if workflow.input.model.fix is defined else 'claude-haiku-4-5' }}"
    prompt: |
      Run the **/fix** skill (bounded root-cause loop; cap enforced in the skill). After
      fixing, re-run the failed checks (component + E2E + a11y) and return `resolved: true`
      only if all now pass, else `resolved: false` with a short reason.
      - feature_slug:     {{ workflow.input.feature_slug }}
      - branch:           feature/{{ workflow.input.feature_slug }}-frontend
      - contract_summary: {{ workflow.input.contract_summary }}
    output:
      resolved: { type: boolean }
      summary: { type: string }
    routes:
      - to: reviewers
        when: "{{ output.resolved }}"
      - to: give_up

  - name: done
    type: terminate
    status: success
    reason: "Frontend green: component + E2E + a11y + frontend review."
    output_template:
      branch: "feature/{{ workflow.input.feature_slug }}-frontend"
      summary: "{{ implement.outputs | length }} slice(s) built"
      tests_passed: "true"
      review_path: "{{ reviewers.output.review_path }}"

  - name: give_up
    type: terminate
    status: failed
    reason: "Frontend still failing after 3 fix attempts — needs a human."

output:
  branch: "feature/{{ workflow.input.feature_slug }}-frontend"
  summary: "{% if implement is defined %}{{ implement.outputs | length }} slice(s) built{% endif %}"
  tests_passed: "{% if reviewers is defined %}true{% else %}false{% endif %}"
  review_path: "{% if reviewers is defined %}{{ reviewers.output.review_path }}{% endif %}"
