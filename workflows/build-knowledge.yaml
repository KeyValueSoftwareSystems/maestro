# Bootstrap domain knowledge by scanning the codebase. A skill emits authoritative structured
# lessons; the engine (mem_consolidate.py) renders them into .maestro/memory/knowledge/*.md.
# Run once per workspace (recommended before your first feature): /build-knowledge
# Re-runnable — the engine merges by lesson key, so re-runs update rather than duplicate.
version: 1
name: build-knowledge
description: Seed initial domain knowledge from the existing codebase.
inputs:
  slug: {type: string, default: bootstrap, description: throwaway run id for the bootstrap}
  feature: {type: string, default: knowledge-bootstrap}
defaults:
  model: haiku
  agent: analyst
start: build
nodes:
  - id: build
    type: agent
    label: Build domain knowledge
    instruction: |
      Scan this workspace and produce initial domain knowledge as a STRUCTURED drop. Read the
      repos under codebase/ (or the single repo), each repo's CLAUDE.md / .cursor/rules, and
      the centralised docs/. Write .maestro/memory/incoming/bootstrap.json as JSON:
      {"slug": "bootstrap", "lessons": [{"domain": "<role>", "key": "<stable-kebab-key>",
      "text": "<one actionable sentence>", "authoritative": true}, ...]}. Bucket by consuming
      role: codebase (shared architecture facts, stacks, build/test commands, conventions,
      gotchas) plus plan, backend-design, frontend-design, backend-review, frontend-review,
      architecture-review. Set authoritative:true on EVERY bootstrap lesson. Do NOT write
      knowledge/ or candidates/ — the engine renders those.
    skill: build-knowledge
    outputs: [domains_written, summary]
    artifact: ".maestro/memory/incoming/bootstrap.json"
    next: consolidate

  - id: consolidate
    type: script
    label: Render knowledge (engine)
    run: [python3, engine/mem_consolidate.py, ".maestro/memory"]
    next: end
