# =============================================================================
# KeyValue AI-SDLC — Conductor orchestrator  ::  main.yaml
# =============================================================================
# Exact flow (per the Developer Implementation Guide):
#
#   feature-input
#     -> DESIGN phase (design.yaml, one sub-workflow):
#          /plan -> assert -> HUMAN approve
#            -> backend-design ∥ frontend-design (per-stack LLDs)
#              -> /api-contract          ==> hld.md + lld/{backend,frontend}.md + openapi.yaml
#        -> assert artifacts -> architecture-review -> HUMAN approve (contract)
#              -> implement (for_each affected stack, parallel)
#                   task-split -> execute -> verify -> role review (backend|frontend)
#                -> merge-for-test (cross-service E2E)
#                   -> QA (/qa)                                       ==> qa artifacts
#                      -> review pack (/review-pack)                  ==> review-pack.md
#                         -> HUMAN approve (release)
#
# One skill, many front doors: every AI step invokes an installed skill by name
# (the same slash command a dev runs in Claude Code / Cursor / Copilot).
# Behavior + external-skill delegation live in the skills; this file only
# sequences, gates, and PROVES each artifact was created (assert_* script steps).
# =============================================================================

workflow:
  name: sdlc-main
  description: >
    Full-stack feature pipeline: design (HLD -> approve -> per-stack LLDs + contract) ->
    approve -> per-stack implementation + reviewers -> integrate -> QA -> release.
  entry_point: derive_slug

  instructions:
    - >-
      Each step invokes an installed skill by name; the skill owns its own behavior.
      Every producing step must WRITE its artifact to the path its skill resolves from
      skills.config.yaml `artifacts:` before returning — a deterministic assert step
      verifies each file exists.

  runtime:
    provider: claude-agent-sdk
    default_model: ${KV_MODEL_DEFAULT:-claude-haiku-4-5}   # global default; see workflows/workflow.config.yaml `models:`

  metadata:
    tracker: sdlc-poc
    scope: dev-to-pr-merge

  limits:
    max_iterations: 80
    timeout_seconds: 5400

  input:
    feature:
      type: string
      required: false
      default: ""
      description: >
        One-line description of the feature to build. Optional — a slug-only run
        (maestro <slug>) falls back to the slug as the label; skills read the real
        description from the PRD.
    feature_slug:
      type: string
      required: false
      default: ""
      description: >
        Kebab-case id for artifact paths, e.g. "saved-search". Optional — if omitted,
        it is derived from `feature` by the `derive_slug` step.
    prd_path:
      type: string
      required: false
      default: ""
      description: >
        Path to the PRD artifact (assumed to exist). If empty, the design phase
        resolves it to `features/<slug>/prd.md` (the per-feature drop folder).
    stacks:
      type: array
      required: false
      default:
        - name: backend
        - name: frontend
      description: >
        Stacks to fan out over. POC default builds backend + frontend. Later,
        derive from design.output.affected_repos.

# ----------------------------------------------------------------------------
# Fan-out: one dispatch.yaml run per stack, concurrently (all_or_nothing).
# ----------------------------------------------------------------------------
for_each:
  - name: implement
    type: for_each
    description: Build affected stacks in parallel (task-split -> execute -> verify -> review).
    source: workflow.input.stacks
    as: stack
    key_by: stack.name
    max_concurrent: 2
    failure_mode: all_or_nothing
    agent:
      name: impl
      type: workflow
      workflow: ./dispatch.yaml
      input_mapping:
        stack: "{{ stack.name }}"
        feature: "{{ workflow.input.feature or derive_slug.output }}"
        feature_slug: "{{ derive_slug.output }}"
        contract_summary: "{{ design.output.contract_summary }}"
        contract_path: "{{ design.output.contract_path }}"
        lld_path: "{{ design.output.backend_lld_path if stack.name == 'backend' else design.output.frontend_lld_path }}"
      # Per-stack outputs come from dispatch.yaml's own `output:` block, surfaced
      # as implement.outputs[<stack>].* (a `type: workflow` agent must not redeclare output).
    routes:
      - to: merge_for_test

agents:
  # ---- 0. DERIVE SLUG -----------------------------------------------------
  # Artifact paths need a kebab-case slug. Use feature_slug if given, else derive
  # one from `feature` so a single `--input feature=...` run still works. Every
  # downstream path/prompt references derive_slug.output (not workflow.input.*).
  - name: derive_slug
    type: set
    value: >-
      {{ (workflow.input.feature_slug or (workflow.input.feature | lower
          | replace(' ', '-') | replace('.', '-') | replace('/', '-')
          | replace(',', '') | replace('(', '') | replace(')', '')))[:64] | trim('-') }}
    output_type: string
    routes:
      - to: design

  # ---- 1. DESIGN: HLD -> approve -> per-stack LLDs -> contract -------------
  # The design sub-workflow owns the whole design phase: it authors the HLD,
  # runs the open-question loop (ask one at a time -> refine -> repeat until
  # resolved), gates it for HUMAN approval, then authors the per-stack LLDs
  # (backend ∥ frontend) and reconciles them into the cross-repo contract via /api-contract.
  # Outputs come from design.yaml's own `output:` block (design.output.*); a
  # `type: workflow` step must NOT redeclare output (schema rejects it).
  - name: design
    type: workflow
    description: HLD -> approve -> per-stack LLDs + contract (via design.yaml).
    workflow: ./design.yaml
    input_mapping:
      feature: "{{ workflow.input.feature or derive_slug.output }}"
      feature_slug: "{{ derive_slug.output }}"
      prd_path: "{{ workflow.input.prd_path }}"
    # Outputs come from design.yaml's own `output:` block (design.output.*).
    routes:
      - to: assert_lld

  # ---- 3b. ASSERT the LLD + contract artifacts exist ----------------------
  - name: assert_lld
    type: script
    description: Verify the per-stack LLDs and the contract were created.
    command: bash
    args:
      - "-c"
      - |
        set -uo pipefail
        s="{{ derive_slug.output }}"
        be="docs/technical/$s/lld/backend.md"
        fe="docs/technical/$s/lld/frontend.md"
        api="contracts/$s/openapi.yaml"
        ok=1
        for f in "$be" "$fe" "$api"; do
          if [ -s "$f" ]; then echo "[artifact] OK: $f"; else echo "[artifact] MISSING/EMPTY: $f" >&2; ok=0; fi
        done
        [ "$ok" = 1 ] && exit 0 || exit 1
    routes:
      - to: arch_review
        when: "exit_code == 0"
      - to: abort                     # missing/empty artifact -> escalate

  # ---- 3c. ARCHITECTURE REVIEW (/architecture-review) --------------
  # Runs the architecture-review skill over the LLD + contract BEFORE any code:
  # gaps, security, scaling, data model, contract soundness. Findings inform the
  # contract approval gate (human decides; blocking findings route to revise).
  - name: arch_review
    description: Architecture review of the LLD/contract via the architecture-review skill.
    prompt: |
      Run the **/architecture-review** skill. Inputs:
      - feature:      {{ workflow.input.feature }}
      - feature_slug: {{ derive_slug.output }}
      Return: review_path, summary, blocking.
    output:
      review_path: { type: string }
      summary: { type: string }
      blocking: { type: boolean }
    routes:
      - to: assert_arch_review

  - name: assert_arch_review
    type: script
    description: Verify the architecture review artifact was created.
    command: bash
    args:
      - "-c"
      - |
        set -uo pipefail
        f=".sdlc/{{ derive_slug.output }}/architecture-review.md"
        if [ -s "$f" ]; then echo "[artifact] OK: $f"; exit 0
        else echo "[artifact] MISSING/EMPTY: $f" >&2; exit 1; fi
    routes:
      - to: arch_gate_router
        when: "exit_code == 0"
      - to: abort                     # missing/empty artifact -> escalate

  # ---- 3d. ARCH-REVIEW GATE ROUTER ----------------------------------------
  # Branch on the reviewer's `blocking` flag (same set-router pattern as
  # dispatch.yaml). Blocking findings force a human decision instead of only
  # being surfaced as prose at the contract gate.
  - name: arch_gate_router
    type: set
    value: "{{ arch_review.output.blocking }}"
    routes:
      - to: arch_blocking_gate
        when: "{{ output == true }}"
      - to: contract_approval

  - name: arch_blocking_gate
    type: human_gate
    description: Architecture review flagged blocking findings — decide before any code.
    prompt: |
      ## Architecture Review — BLOCKING findings — {{ workflow.input.feature }}

      Review: `.sdlc/{{ derive_slug.output }}/architecture-review.md`

      **Summary:** {{ arch_review.output.summary }}

      The reviewer marked one or more blocker/major findings. Revise the design, proceed
      anyway (accept the risk), or reject.
    options:
      - label: "Revise the design (LLD/contract)"
        value: revise
        route: design
        prompt_for: feedback
      - label: "Proceed anyway — accept risk"
        value: proceed
        route: contract_approval
      - label: "Reject — abort"
        value: reject
        route: abort

  # ---- 4. HUMAN APPROVAL: contract ----------------------------------------
  - name: contract_approval
    type: human_gate
    description: Confirm the API/DB contract before any code is written.
    prompt: |
      ## Contract Review — {{ workflow.input.feature }}

      Artifacts to review:
      - Backend LLD: `docs/technical/{{ derive_slug.output }}/lld/backend.md`
      - Frontend LLD: `docs/technical/{{ derive_slug.output }}/lld/frontend.md`
      - Contract: `contracts/{{ derive_slug.output }}/openapi.yaml`

      **Affected stacks:** {{ design.output.affected_repos | json }}
      **Contract summary:** {{ design.output.contract_summary }}

      Approve to fan out implementation, request revisions, or reject.
    options:
      - label: "Approve — start implementation"
        value: approve
        route: implement
      - label: "Request contract revisions"
        value: revise
        route: design
        prompt_for: feedback
      - label: "Reject — abort"
        value: reject
        route: abort

  # ---- 5. MERGE FOR TEST (script) -----------------------------------------
  - name: merge_for_test
    type: script
    description: Integrate all built branches and run cross-service E2E.
    command: bash
    args:
      - "-c"
      - |
        set -uo pipefail
        {% for name, out in implement.outputs.items() %}
        echo "[merge_for_test] {{ name }} branch: {{ out.branch }} (review: {{ out.review_path }})"
        {% endfor %}
        # Real POC: per branch -> kv up && ./run-e2e.sh ; rc=$? ; kv down ; exit $rc
        echo "ensure-clean -> up -> seed -> ready_check -> e2e -> down"
        echo "integration E2E: PASS"
        exit 0
    timeout: 1800
    routes:
      - to: qa
        when: "exit_code == 0"
      - to: rework_gate

  # ---- 5b. REWORK GATE (only on failed integration) -----------------------
  - name: rework_gate
    type: human_gate
    description: Integration tests failed — decide how to proceed.
    prompt: |
      ## Integration Failed — {{ workflow.input.feature }}

      Cross-service E2E failed when merging:
      {% for name, out in implement.outputs.items() %}
      - {{ name }}: `{{ out.branch }}`
      {% endfor %}

      ```
      {{ merge_for_test.output.stdout }}
      {{ merge_for_test.output.stderr }}
      ```
    options:
      - label: "Re-run implementation"
        value: rework
        route: implement
      - label: "Abort the feature"
        value: abort
        route: abort

  # ---- 6. QA (/qa -> qa-automation) ---------------------------------------
  - name: qa
    type: workflow
    description: Author + run critical-journey E2E from acceptance criteria.
    workflow: ./qa.yaml
    input_mapping:
      feature: "{{ workflow.input.feature }}"
      feature_slug: "{{ derive_slug.output }}"
      acceptance_criteria: "{{ design.output.acceptance_criteria }}"
      contract_summary: "{{ design.output.contract_summary }}"
    # Outputs come from qa.yaml's own `output:` block (qa.output.*).
    routes:
      - to: review_pack

  # ---- 7. HUMAN REVIEW PACK (/review-pack) --------------------------------
  - name: review_pack
    description: Assemble the PR/release review pack via the human-review-pack skill.
    prompt: |
      Run the **/review-pack** skill. Inputs:
      - feature:      {{ workflow.input.feature }}
      - feature_slug: {{ derive_slug.output }}
      Built stacks:
      {% for name, out in implement.outputs.items() %}
      - {{ name }}: branch `{{ out.branch }}` — tests_passed={{ out.tests_passed }};
        reviewer findings: `{{ out.review_path }}`; {{ out.summary }}
      {% endfor %}
      QA suite: `{{ qa.output.suite_path }}` (passed={{ qa.output.tests_passed }})
      Integration E2E: {{ merge_for_test.output.stdout }}
      Return: pack_path.
    output:
      pack_path:
        type: string
        description: Path to the written review pack.
    routes:
      - to: assert_review_pack

  - name: assert_review_pack
    type: script
    description: Verify the review pack was created.
    command: bash
    args:
      - "-c"
      - |
        set -uo pipefail
        f=".sdlc/{{ derive_slug.output }}/review-pack.md"
        if [ -s "$f" ]; then echo "[artifact] OK: $f"; exit 0
        else echo "[artifact] MISSING/EMPTY: $f" >&2; exit 1; fi
    routes:
      - to: release_approval
        when: "exit_code == 0"
      - to: abort                     # missing/empty artifact -> escalate

  # ---- 8. HUMAN APPROVAL: release -----------------------------------------
  - name: release_approval
    type: human_gate
    description: Final sign-off after green integration + QA and the review pack.
    prompt: |
      ## Release Approval — {{ workflow.input.feature }}

      Review pack: `.sdlc/{{ derive_slug.output }}/review-pack.md`

      | Stack | Branch | Tests |
      |------|--------|-------|
      {% for name, out in implement.outputs.items() %}
      | {{ name }} | `{{ out.branch }}` | {{ out.tests_passed }} |
      {% endfor %}

      QA passed: {{ qa.output.tests_passed }}

      Approve to complete (merge PRs in order: backend → frontend), or reject.
    options:
      - label: "Approve — proceed to final merge"
        value: approve
        route: $end
      - label: "Reject the release"
        value: reject
        route: abort

  # ---- terminal: abort ----------------------------------------------------
  - name: abort
    type: terminate
    status: failed
    reason: "Feature aborted (gate rejection or missing artifact)."

output:
  feature: "{{ workflow.input.feature }}"
  feature_slug: "{{ derive_slug.output }}"
  hld: "docs/technical/{{ derive_slug.output }}/hld.md"
  lld_backend: "docs/technical/{{ derive_slug.output }}/lld/backend.md"
  lld_frontend: "docs/technical/{{ derive_slug.output }}/lld/frontend.md"
  contract: "contracts/{{ derive_slug.output }}/openapi.yaml"
  stacks_built: "{% if implement is defined %}{{ implement.outputs | length }}{% endif %}"
  results: "{% if implement is defined %}{{ implement.outputs | json }}{% endif %}"
  review_pack: ".sdlc/{{ derive_slug.output }}/review-pack.md"
