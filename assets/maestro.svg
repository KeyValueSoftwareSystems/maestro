<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img"
     font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace">
  <title>Maestro — deterministic workflows for AI coding agents</title>
  <desc>One workflow, your whole team, every time. A dark schematic hero showing a mid-run SDLC workflow graph: prd and design done, implement running, review and qa pending, ending at a ship gate, with a back-edge loop.</desc>

  <defs>
    <radialGradient id="glow" cx="0.88" cy="0.06" r="0.55">
      <stop offset="0" stop-color="#EBB24A" stop-opacity="0.10"/>
      <stop offset="0.55" stop-color="#EBB24A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.03" cy="1" r="0.5">
      <stop offset="0" stop-color="#57B784" stop-opacity="0.05"/>
      <stop offset="0.6" stop-color="#57B784" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.9" fill="#ffffff" fill-opacity="0.02"/>
    </pattern>
    <clipPath id="cardclip"><rect x="20" y="20" width="1160" height="600" rx="16"/></clipPath>
  </defs>

  <!-- ground + card -->
  <rect x="0" y="0" width="1200" height="640" fill="#070809"/>
  <rect x="20" y="20" width="1160" height="600" rx="16" fill="#0C0F15" stroke="#1E2530" stroke-width="1"/>
  <rect x="20" y="20" width="1160" height="600" fill="url(#glow)" clip-path="url(#cardclip)"/>
  <rect x="20" y="20" width="1160" height="600" fill="url(#glow2)" clip-path="url(#cardclip)"/>
  <rect x="20" y="20" width="1160" height="600" fill="url(#dots)" clip-path="url(#cardclip)"/>

  <!-- top bar -->
  <text x="52" y="57" font-size="16" font-weight="650" letter-spacing="-0.2" fill="#D6DCE5">Maestro</text>
  <line x1="20" y1="77" x2="1180" y2="77" stroke="#1E2530" stroke-width="1"/>

  <!-- ================= left column ================= -->
  <text x="56" y="138" font-size="12" font-weight="600" letter-spacing="1.9" fill="#EBB24A">— ONE WORKFLOW. YOUR WHOLE TEAM. EVERY TIME.</text>

  <text font-size="40" font-weight="640" letter-spacing="-0.5">
    <tspan x="56" y="196" fill="#EBB24A">Deterministic</tspan>
    <tspan x="56" y="240" fill="#D6DCE5">workflows for</tspan>
    <tspan x="56" y="284" fill="#D6DCE5">AI coding agents.</tspan>
  </text>

  <text x="56" y="330" font-size="13.5" font-weight="400" fill="#8B94A3">
    <tspan x="56" dy="0">Set up your team's flow once and everyone runs it the</tspan>
    <tspan x="56" dy="20">same way, right inside Claude Code or Cursor — </tspan><tspan font-weight="600" fill="#D6DCE5">same steps,</tspan>
    <tspan x="56" dy="20" font-weight="600" fill="#D6DCE5">same gates, same result</tspan><tspan fill="#8B94A3"> whether it's a</tspan>
    <tspan x="56" dy="20" fill="#8B94A3">staff engineer or a first-week hire. </tspan><tspan font-weight="600" fill="#D6DCE5">An engine</tspan>
    <tspan x="56" dy="20" font-weight="600" fill="#D6DCE5">that follows the plan, not an agent that improvises one.</tspan>
  </text>

  <!-- runs across + chips -->
  <text x="56" y="454" font-size="11" font-weight="600" letter-spacing="1.6" fill="#5E6879">RUNS ACROSS</text>
  <g>
    <rect x="160" y="436" width="126" height="28" rx="14" fill="#0E1219" stroke="#1E2530" stroke-width="1"/>
    <circle cx="177" cy="450" r="3" fill="#EBB24A"/>
    <text x="189" y="454" font-size="13" fill="#D6DCE5">Claude Code</text>
  </g>
  <g>
    <rect x="298" y="436" width="86" height="28" rx="14" fill="#0E1219" stroke="#1E2530" stroke-width="1"/>
    <circle cx="315" cy="450" r="3" fill="#EBB24A"/>
    <text x="327" y="454" font-size="13" fill="#D6DCE5">Cursor</text>
  </g>

  <!-- proof strip -->
  <line x1="56" y1="486" x2="636" y2="486" stroke="#141922" stroke-width="1"/>
  <text x="56" y="510" font-size="12.5" fill="#5E6879">
    <tspan>Runs in your session</tspan><tspan fill="#EBB24A">   ·   </tspan><tspan>No API key</tspan><tspan fill="#EBB24A">   ·   </tspan><tspan>Human gates</tspan><tspan fill="#EBB24A">   ·   </tspan><tspan>Proof, not promises</tspan>
  </text>

  <!-- ================= right panel ================= -->
  <rect x="700" y="124" width="452" height="452" rx="12" fill="#0F131B" stroke="#1E2530" stroke-width="1"/>
  <line x1="700" y1="166" x2="1152" y2="166" stroke="#141922" stroke-width="1"/>
  <circle cx="720" cy="146" r="3" fill="#EBB24A"/>
  <text x="732" y="150" font-size="10.5" font-weight="600" letter-spacing="1.4" fill="#EBB24A">RUNNING</text>

  <!-- workflow graph (static resting state) -->
  <svg x="774" y="170" width="304" height="362" viewBox="0 0 380 452">
    <!-- forward edges -->
    <path d="M190 64 V92"  stroke="#1E2530" stroke-width="1.4" fill="none"/>
    <path d="M190 138 V166" stroke="#1E2530" stroke-width="1.4" fill="none"/>
    <path d="M190 212 V240" stroke="#1E2530" stroke-width="1.4" fill="none"/>
    <path d="M190 286 V314" stroke="#1E2530" stroke-width="1.4" fill="none"/>
    <path d="M190 360 V388" stroke="#1E2530" stroke-width="1.4" fill="none"/>

    <!-- back-edge loop: qa -> implement -->
    <path d="M70 337 C22 337 22 189 70 189" stroke="#EBB24A" stroke-width="1.3" fill="none" stroke-dasharray="5 5" opacity="0.75"/>
    <text transform="rotate(-90 16 268)" x="16" y="268" text-anchor="middle" font-size="10" letter-spacing="0.5" fill="#EBB24A" opacity="0.9">back-edge · loop</text>

    <!-- prd (done) -->
    <rect x="70" y="18" width="240" height="46" rx="9" fill="#0D1117" stroke="#57B784" stroke-opacity="0.55" stroke-width="1"/>
    <circle cx="294" cy="41" r="4" fill="#57B784"/>
    <text x="88" y="46" font-size="13" fill="#D6DCE5">prd</text>
    <text x="278" y="45" font-size="10.5" text-anchor="end" letter-spacing="0.5" fill="#57B784">DONE</text>

    <!-- design (done) -->
    <rect x="70" y="92" width="240" height="46" rx="9" fill="#0D1117" stroke="#57B784" stroke-opacity="0.55" stroke-width="1"/>
    <circle cx="294" cy="115" r="4" fill="#57B784"/>
    <text x="88" y="120" font-size="13" fill="#D6DCE5">design</text>
    <text x="278" y="119" font-size="10.5" text-anchor="end" letter-spacing="0.5" fill="#57B784">DONE</text>

    <!-- implement (running) -->
    <rect x="64" y="160" width="252" height="58" rx="12" fill="#EBB24A" opacity="0.16"/>
    <rect x="70" y="166" width="240" height="46" rx="9" fill="#241E12" stroke="#EBB24A" stroke-width="1.5"/>
    <circle cx="294" cy="189" r="4" fill="#EBB24A"/>
    <text x="88" y="194" font-size="13" fill="#D6DCE5">implement</text>
    <text x="278" y="193" font-size="10.5" text-anchor="end" letter-spacing="0.5" fill="#EBB24A">RUNNING</text>

    <!-- review (pending) -->
    <rect x="70" y="240" width="240" height="46" rx="9" fill="#0D1117" stroke="#3A434F" stroke-width="1"/>
    <circle cx="294" cy="263" r="4" fill="#3A434F"/>
    <text x="88" y="268" font-size="13" fill="#8B94A3">review</text>
    <text x="278" y="267" font-size="10.5" text-anchor="end" letter-spacing="0.5" fill="#5E6879">PENDING</text>

    <!-- qa (pending) -->
    <rect x="70" y="314" width="240" height="46" rx="9" fill="#0D1117" stroke="#3A434F" stroke-width="1"/>
    <circle cx="294" cy="337" r="4" fill="#3A434F"/>
    <text x="88" y="342" font-size="13" fill="#8B94A3">qa</text>
    <text x="278" y="341" font-size="10.5" text-anchor="end" letter-spacing="0.5" fill="#5E6879">PENDING</text>

    <!-- gate: ship? (human) -->
    <rect x="70" y="388" width="240" height="46" rx="9" fill="none" stroke="#5E6879" stroke-width="1" stroke-dasharray="4 4"/>
    <path d="M92 411 l7 -8 l7 8 l-7 8 Z" fill="none" stroke="#EBB24A" stroke-width="1.3"/>
    <text x="116" y="416" font-size="13" fill="#8B94A3">gate: ship?</text>
    <text x="290" y="415" font-size="10.5" text-anchor="end" letter-spacing="0.5" fill="#5E6879">HUMAN</text>
  </svg>

  <!-- readout -->
  <line x1="700" y1="536" x2="1152" y2="536" stroke="#141922" stroke-width="1"/>
  <text x="716" y="560" font-size="12">
    <tspan fill="#EBB24A" font-weight="600">→ </tspan><tspan fill="#8B94A3">run_agent  </tspan><tspan fill="#D6DCE5">skill:</tspan><tspan fill="#8B94A3">implement  </tspan><tspan fill="#D6DCE5">model:</tspan><tspan fill="#8B94A3">haiku</tspan>
  </text>
</svg>
