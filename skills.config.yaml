# =============================================================================
# skills.config.yaml — the KeyValue SDLC "skillset"
# =============================================================================
# Single source of truth for WHICH skill (and which EXTERNAL skill) backs each
# slot in the SDLC flow. Read by BOTH front doors:
#   • Slash commands — a dev running `/backend-impl` reads only this file.
#   • Conductor      — every workflow step invokes the same skills; the workflow
#                      never re-implements behavior, it just calls the slot.
#
# Swap a value here to swap behavior everywhere (commands + workflow) without
# editing any SKILL.md or workflow YAML.
#
# EXTERNAL SKILLS: every `external:` value is the BARE NAME OF A SKILL, or `none`.
# It is the name a skill is DISCOVERED by once installed into `.claude/skills/`
# (Claude Code) or `.cursor/skills/` (Cursor) — NOT a `pack:skill` plugin path.
# Superpowers skills install loose into those dirs (via install.sh), so the name
# is `brainstorming`, not `superpowers:brainstorming`.
# Our skills don't hardcode any pack — they read the slot and use whatever skill
# you name (a Superpowers skill, any project-local skill, the built-in Explore
# agent, ...) or fall back inline if it's `none`/absent.
# -----------------------------------------------------------------------------

version: 1

# ---- 1. Plan — high-level design (writes the HLD doc) -----------------------
plan:
  skill: plan
  external:
    brainstorm: brainstorming                   # ideation skill (Superpowers) | none

# ---- 2. LLD (per-stack low-level design) + cross-repo contract --------------
# The design skills each author ONE per-stack LLD (they read the code to ground
# the design; they do NOT emit a separate map). /api-contract then reconciles the
# two LLDs into the formal OpenAPI contract. HLD (section 1) + these run together
# in the design phase (workflows/design.yaml): HLD -> approve -> LLDs -> contract.
lld:
  backend:  backend-design                      # -> .maestro/<slug>/lld/backend.md
  frontend: frontend-design                     # -> .maestro/<slug>/lld/frontend.md
  external:
    research: none                              # deep-research for unfamiliar libs/protocols | none
contract:
  skill: api-contract                           # reconciles the LLDs -> .maestro/<slug>/openapi.yaml

# ---- 3. Backend implementation ----------------------------------------------
backend:
  tasks: backend-tasks
  impl:  backend-implement
  external:
    tasks: writing-plans                         # task-splitting skill (Superpowers) | none
    tdd:   test-driven-development               # RED-GREEN-REFACTOR skill (Superpowers) | none

# ---- 4. Frontend implementation ---------------------------------------------
frontend:
  impl: frontend-implement
  external:
    tdd:  none                                  # a skill name | none
    a11y: none                                  # accessibility skill | none

# ---- 5. QA automation -------------------------------------------------------
qa:
  automation: qa-automation
  framework:  playwright                        # web: playwright | mobile: maestro
  external:
    generator: none                             # e.g. a webapp-testing skill | none

# ---- 6. Specialist review — THREE role review skills, one per phase ---------
# Each phase has its own review skill (a slash command) carrying all that role's
# dimensions. The skill runs the review inline, or (where the harness supports it,
# e.g. Claude Code) spawns a fresh read-only sub-agent for an isolated pass — same
# behavior either way. Portable to any IDE via commands.
review:
  external: requesting-code-review               # shared review-method skill (Superpowers) | none
  architecture:                                  # AFTER LLD — gaps, security, scaling, data model, contract
    skill: architecture-review
  backend:                                       # AFTER backend impl — security, contract, perf/scaling, backward-compat, test gaps
    skill: backend-review
  frontend:                                      # AFTER frontend impl — UI states, a11y, security, perf, resilience, test gaps
    skill: frontend-review

# ---- Shared skills ----------------------------------------------------------
shared:
  verify:            verify
  fix_loop:          fix-loop
  human_review_pack: human-review-pack
  external:
    debug:     systematic-debugging              # used by the fix-loop skill (/fix) (Superpowers) | none
    worktrees: using-git-worktrees               # parallel-build isolation (Superpowers) | none

# ---- Artifact paths (feature-scoped; <slug> = feature_slug) -----------------
# Every producing step writes to one of these paths; the workflow verifies each
# file exists and is non-empty (a `test -s` gate) before advancing. Everything
# for a feature — the input requirement and all generated artifacts — lives under
# one folder, .maestro/<slug>/. The archive step later publishes the design docs
# from here into committed docs/technical|functional/.
artifacts:
  requirement:    .maestro/<slug>/requirement/        # INPUT: folder of requirement files (all read by /plan)
  hld:         .maestro/<slug>/hld.md
  open_questions: .maestro/<slug>/open-questions.json # machine-readable HLD open-question loop state (mirrors the HLD "Open questions" prose)
  lld:         .maestro/<slug>/lld/                    # backend.md, frontend.md (one per stack)
  contract:    .maestro/<slug>/openapi.yaml
  acceptance:  .maestro/<slug>/acceptance-criteria.md
  work_dir:    .maestro/<slug>/                        # tasks, verify, reviews, review-pack
  tasks:       .maestro/<slug>/<stack>/tasks.json      # machine-readable task DAG (<stack> = backend|frontend|qa)
